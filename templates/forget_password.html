<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Forgot Password</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        border-radius: 14px;
        overflow: hidden;
      }
      .login-header {
        background: #405189;
        color: #fff;
        text-align: center;
        padding: 25px;
      }
      .form-control {
        padding-left: 45px;
      }
      .form-icon {
        position: relative;
      }
      .form-icon i {
        position: absolute;
        top: 50%;
        left: 15px;
        transform: translateY(-50%);
        color: #405189;
      }
      .btn-login {
        background: #0ab39c;
        border: none;
      }
      .btn-login:hover {
        background: #099885;
      }
    </style>
  </head>

  <body>
    <div class="col-md-5 col-lg-4">
      <div class="card shadow-lg login-card">
        <div class="login-header">
          <h3 class="mb-1">Forgot Password?</h3>
          <p class="mb-0 opacity-75">Enter your registered email</p>
        </div>

        <div class="card-body p-4">
          <form id="forget_form">
            {% csrf_token %}

            <div class="mb-3 form-icon">
              <i class="ri-mail-line"></i>
              <input
                type="email"
                class="form-control"
                id="email_input"
                name="email"
                placeholder="Email Address"
                required
              />
            </div>

            <!-- Success / Error message yahan aayega -->
            <div id="msg_box"></div>

            <div class="d-grid mt-3">
              <button
                type="submit"
                id="send_otp_btn"
                class="btn btn-login btn-lg text-white"
              >
                <i class="ri-send-plane-line me-1"></i> Send OTP
              </button>
            </div>
          </form>

          <div class="text-center mt-3">
            <small class="text-muted">
              Remember password?
              <a href="{% url 'sign_in' %}" class="fw-semibold">Sign In</a>
            </small>
          </div>
        </div>
      </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
      $(document).ready(function () {
        $("#forget_form").on("submit", function (e) {
          e.preventDefault();

          var email = $("#email_input").val(); // ← "email" naam diya
          var csrf = $("[name=csrfmiddlewaretoken]").val();

          $.ajax({
            url: "{% url 'forget_password' %}",
            method: "POST",
            data: {
              email: email, // ← ab match ho gaya
              csrfmiddlewaretoken: csrf,
            },
            success: function (response) {
              if (response.status === "success") {
                // 👇 YAHAN SE OTP PAGE KHULEGA
                setTimeout(function () {
                  window.location.href = "/otp_verify/";
                }, 1500);
              }
            },
            error: function (error) {
              console.log(error);
            },
          });
        });
      });
    </script>
  </body>
</html>
