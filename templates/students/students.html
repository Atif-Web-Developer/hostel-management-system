{% include 'header.html' %}
{% include 'sidebar.html' %}

<div class="main-content">
    <div class="page-content">
        <div class="container-fluid">

            <!-- Page Title -->
            <div class="row mb-4">
                <div class="col-12">
                    <div class="page-title-box d-sm-flex align-items-center justify-content-between bg-light p-3 rounded">
                        <h4 class="mb-0">Add New Student</h4>
                        <ol class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a href="">Dashboard</a></li>
                            <li class="breadcrumb-item active">Add Student</li>
                        </ol>
                    </div>
                </div>
            </div>

            <!-- Student Form -->
            <div class="row">
                <div class="col-12">
                    <div class="card shadow-sm border-0">
                        <div class="card-header  text-white">
                            <h5 class="mb-0">Student Information</h5>
                        </div>
                        <div class="card-body">
                            <form method="POST" id="form_data">
                                {% csrf_token %}
                                <div class="row g-3">

                                    <!-- Column 1 -->
                                    <div class="col-md-4">
                                        <label for="name" class="form-label">Full Name</label>
                                        <input type="text" maxlength="30" class="form-control" id="name" name="name" placeholder="Enter full name">
                                    </div>

                                    <!-- Column 2 -->
                                    <div class="col-md-4">
                                        <label for="roll_no" class="form-label">Roll Number</label>
                                        <input type="text" maxlength="10" class="form-control" id="roll_no" name="roll_no" placeholder="Enter roll number">
                                    </div>

                                    <!-- Column 3 -->
                                    <div class="col-md-4">
                                        <label for="student_class" class="form-label">Class</label>
                                        <input type="text" maxlength="30" class="form-control" id="student_class" name="student_class" placeholder="Enter class">
                                    </div>

                                    <!-- Column 4 -->
                                    <div class="col-md-4">
                                        <label for="email" class="form-label">Email</label>
                                        <input type="email" maxlength="40" class="form-control" id="email" name="email" placeholder="example@gmail.com">
                                    </div>

                                    <!-- Column 5 -->
                                    <div class="col-md-4">
                                        <label for="contact" class="form-label">Contact</label>
                                        <input type="text" maxlength="11" class="form-control" id="contact" name="contact" placeholder="Enter contact number">
                                    </div>

                                    <!-- Column 6 -->
                                    <div class="col-md-4">
                                        <label for="hostel_room" class="form-label">Hostel Room</label>
                                        <input type="text" maxlength="3" class="form-control" id="hostel_room" name="hostel_room" placeholder="Enter hostel room">
                                    </div>

                                    <!-- Submit Button -->
                                    <div class="col-12 mt-3">
                                        <button type="submit" id="add_student" class="btn btn-success btn-lg w-100">Add Student</button>
                                    </div>

                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            <!-- End Form -->

        </div>
    </div>

    {% include 'footer.html' %}
</div>
<script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
<script>
$(document).ready(function(){
    $("#add_student").click(function(e){
        e.preventDefault();
        var Formdata = $("#form_data").serialize();
        $.ajax({
            url: "{% url 'student' %}",
            type: "POST",
            data: Formdata,
            success: function(response){
                if(response.status=="sucess"){
                    
                }else{
                    alert(response.message)
                }
                console.log(response);
            },
            error: function(error){
                console.log(error);
            }
        });
    });
});
</script>
