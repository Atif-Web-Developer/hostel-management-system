{% include 'header.html' %}
{% include 'sidebar.html' %}

<div class="main-content">
  <div class="page-content">
    <div class="container-fluid">

      <!-- Page Title -->
      <div class="row mb-4">
        <div class="col-12">
          <div class="page-title-box d-sm-flex align-items-center justify-content-between bg-light p-3 rounded">
            <h4 class="mb-0">Add New Book</h4>
            <ol class="breadcrumb mb-0">
              <li class="breadcrumb-item"><a href="">Dashboard</a></li>
              <li class="breadcrumb-item active">Add Book</li>
            </ol>
          </div>
        </div>
      </div>

      <!-- Book Form -->
      <div class="row">
        <div class="col-12">
          <div class="card shadow-sm border-0">
            <div class="card-header text-white">
              <h5 class="mb-0">Book Information</h5>
            </div>

            <div class="card-body">
              <form method="POST" id="form_data">
                {% csrf_token %}
                <div class="row g-3">

                  <!-- Book Title -->
                  <div class="col-md-4">
                    <label class="form-label">Book Title</label>
                    <input type="text" class="form-control" name="title" placeholder="Enter book title">
                  </div>

                  <!-- Author -->
                  <div class="col-md-4">
                    <label class="form-label">Author</label>
                    <input type="text" class="form-control" name="author" placeholder="Enter author name">
                  </div>

                  <!-- ISBN -->
                  <div class="col-md-4">
                    <label class="form-label">ISBN</label>
                    <input type="text" class="form-control" name="isbn" placeholder="Enter ISBN number">
                  </div>

                  <!-- Issued To (Student) -->
                  <div class="col-md-4">
                    <label class="form-label">Issued To</label>
                    <select name="issued_to" class="form-control">
                      <option value="">-- Select Student --</option>
                      {% for student in students %}
                        <option value="{{ student.id }}">
                          {{ student.name }} 
                        </option>
                      {% endfor %}
                    </select>
                  </div>

                  <!-- Issue Date -->
                  <div class="col-md-4">
                    <label class="form-label">Issue Date</label>
                    <input type="date" class="form-control" name="issue_date">
                  </div>

                  <!-- Return Date -->
                  <div class="col-md-4">
                    <label class="form-label">Return Date</label>
                    <input type="date" class="form-control" name="return_date">
                  </div>

                  <!-- Submit -->
                  <div class="col-12 mt-3">
                    <button type="submit" id="add_book" class="btn btn-success btn-lg w-100">
                      Add Book
                    </button>
                  </div>

                </div>
              </form>
            </div>

          </div>
        </div>
      </div>
      <!-- End Form -->

    </div>
  </div>

  {% include 'footer.html' %}
</div>

<script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
<script>
    $(document).ready(function(){
        $(document).on("click","#add_book",function(e){
            e.preventDefault();
            var data=new FormData($("#form_data")[0]);
            $.ajax({
                url: "{% url 'add_book' %}",
                method:"POST",
                data:data,
                processData:false,
                contentType:false,
                success:function(request){
                    console.log(request)
                },
                error:function(error){
                    console.log(error)
                }
            })
        })
    })
</script>
