<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Registration</title>

    <!-- Bootstrap + Icons (Velzon compatible) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        body {
            
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-card {
            border-radius: 14px;
            overflow: hidden;
        }
        .register-header {
            background: #405189;
            color: #fff;
            text-align: center;
            padding: 25px;
        }
        .form-control {
            padding-left: 45px;
        }
        .form-icon {
            position: relative;
        }
        .form-icon i {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: #405189;
        }
        .btn-register {
            background: #0ab39c;
            border: none;
        }
        .btn-register:hover {
            background: #099885;
        }
    </style>
</head>

<body>

<div class="col-md-6 col-lg-4">
    <div class="card shadow-lg register-card">
        
        <!-- Title -->
        <div class="register-header">
            <h3 class="mb-1">Create Account</h3>
        </div>

        <!-- Form -->
        <div class="card-body p-4">
            <form method="POST" id="formdata">
                {% csrf_token %}

                <div class="mb-3 form-icon">
                    <i class="ri-user-line"></i>
                    <input type="text" class="form-control" name="name" placeholder="Full Name" maxlength="30">
                </div>

                <div class="mb-3 form-icon">
                    <i class="ri-mail-line"></i>
                    <input type="email" class="form-control" name="email" placeholder="Email Address" maxlength="40">
                </div>

                <div class="mb-3 form-icon">
                    <i class="ri-phone-line"></i>
                    <input type="text" class="form-control" name="phone" placeholder="Phone Number" maxlength="11">
                </div>

                <div class="mb-3 form-icon">
                    <i class="ri-id-card-line"></i>
                    <input type="text" class="form-control" name="cnic" placeholder="CNIC (XXXXX-XXXXXXX-X)" maxlength="15">
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" id="register" class="btn btn-register btn-lg text-white">
                        <i class="ri-user-add-line me-1"></i> Register
                    </button>
                </div>
            </form>

            <div class="text-center mt-3">
                <small class="text-muted">
                    Already have an account? <a href="{% url 'sign_in' %}" class="fw-semibold">Sign In</a>
                </small>
            </div>
        </div>
    </div>
</div>

</body>
</html>
<script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
<script>
$(document).ready(function () {

    $("#formdata").on("submit", function (e) {
        e.preventDefault();

        $.ajax({
            url: "{% url 'registration' %}",
            method: "POST",
            data: $(this).serialize(),
            success: function (response) {

                if (response.status === "success") {
                    alert(response.message);
                    $("#formdata")[0].reset();
                    window.location.href = response.redirect_url;
                } else {
                    alert(response.message);
                }
            },
            error: function (error) {
                console.log(error);
            }
        });
    });

});
</script>
