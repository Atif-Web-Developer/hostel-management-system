<!doctype html>
<html>
  <head>
    <title>Checkout</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="main-content">
      <div class="page-content">
        <div class="container-fluid">
          <!-- Page Title -->
          <div class="row mb-4">
            <div class="col-12">
              <div
                class="page-title-box d-sm-flex align-items-center justify-content-between bg-light p-3 rounded"
              >
                <h4 class="mb-0">Secure Checkout</h4>
                <ol class="breadcrumb mb-0">
                  <li class="breadcrumb-item"><a href="">Dashboard</a></li>
                  <li class="breadcrumb-item active">Checkout</li>
                </ol>
              </div>
            </div>
          </div>

          <!-- Checkout Card -->
          <div class="card p-4">
            <h3>Payment Summary</h3>
            <p><strong>Student:</strong> {{ payment.student.name }}</p>
            <p><strong>Amount to Pay:</strong> Rs. {{ payment.amount }}</p>

            <form method="POST" action="/checkout/{{ payment.id }}/">
    {% csrf_token %}
    <button type="submit" class="btn btn-primary w-100 py-3">
        Proceed to Secure Payment
    </button>
</form>

            <p class="text-muted mt-2 small">
              * You will be redirected to Stripe's secure portal to enter card
              details.
            </p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
