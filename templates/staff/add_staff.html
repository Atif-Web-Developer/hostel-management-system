{% include 'header.html' %} {% include 'sidebar.html' %}

<div class="main-content">
  <div class="page-content">
    <div class="container-fluid">
      <!-- Page Title -->
      <div class="row mb-4">
        <div class="col-12">
          <div
            class="page-title-box d-sm-flex align-items-center justify-content-between bg-light p-3 rounded"
          >
            <h4 class="mb-0">Add New Staff</h4>
            <ol class="breadcrumb mb-0">
              <li class="breadcrumb-item"><a href="">Dashboard</a></li>
              <li class="breadcrumb-item active">Add Staff</li>
            </ol>
          </div>
        </div>
      </div>

      <!-- Room Form -->
      <div class="row">
        <div class="col-12">
          <div class="card shadow-sm border-0">
            <div class="card-header text-white bg-success">
              <h5 class="mb-0" style="text-align: center">Staff Information</h5>
            </div>

            <div class="card-body">
              <form method="post" enctype="multipart/form-data" id="form_data">
                {% csrf_token %}

                <div class="row">
                  <!-- Left Side: Form Fields -->
                  <div class="col-md-8">
                    <!-- Staff Name -->
                    <div class="mb-3">
                      <label class="form-label">Staff Name</label>
                      <input
                        type="text"
                        name="name"
                        class="form-control"
                        placeholder="Enter staff name"
                        required
                      />
                    </div>

                    <!-- Role -->
                    <div class="mb-3">
                      <label class="form-label">Role</label>
                      <select name="role" class="form-select" required>
                        <option value="">Select Role</option>
                        <option value="teacher">Teacher</option>
                        <option value="principal">Principal</option>
                        <option value="admin">Admin</option>
                        <option value="accountant">Accountant</option>
                        <option value="librarian">Librarian</option>
                        <option value="it">IT Support</option>
                        <option value="guard">Guard</option>
                        <option value="cleaner">Cleaner</option>
                      </select>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                      <label class="form-label">Email</label>
                      <input
                        type="email"
                        name="email"
                        class="form-control"
                        placeholder="Enter email"
                        required
                      />
                    </div>

                    <!-- Contact -->
                    <div class="mb-3">
                      <label class="form-label">Contact</label>
                      <input
                        type="text"
                        name="contact"
                        class="form-control"
                        placeholder="Enter contact number"
                        required
                      />
                    </div>

                    <!-- Submit Button -->
                    <button
                      type="submit"
                      id="add_staff"
                      class="btn btn-success mt-3"
                    >
                      Save Staff
                    </button>
                  </div>

                  <!-- Right Side: Image Preview -->
                  <div class="col-md-4 text-center">
                    <label class="form-label">Staff Picture</label>
                    <input
                      type="file"
                      name="picture"
                      class="form-control mb-3"
                      accept="image/*"
                      id="picture_input"
                    />
                    <img
                      id="image_preview"
                      src=""
                      alt="Preview"
                      style="
                        max-width: 100%;
                        max-height: 200px;
                        display: none;
                        border: 1px solid #ccc;
                        padding: 5px;
                      "
                    />
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
      <!-- End Form -->
    </div>
  </div>

  {% include 'footer.html' %}
</div>
<script
  src="https://code.jquery.com/jquery-3.7.1.js"
  integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
  crossorigin="anonymous"
></script>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  $(document).ready(function () {
    $(document).on("click", "#add_staff", function (e) {
      e.preventDefault(); // prevent default form submission

      var form = $("#form_data")[0];
      var data = new FormData(form);

      $.ajax({
        url: "{% url 'insert_staff' %}",
        method: "POST",
        data: data,
        processData: false,
        contentType: false,
        success: function (response) {
          if (response.status === "success") {
            Swal.fire({
              title: "Success!",
              text: response.message,
              icon: "success",
              timer: 2000,
              showConfirmButton: false,
            });

            // Reset form
            $("#form_data")[0].reset();
            
          } else {
            // Error popup
            Swal.fire({
              title: "Error!",
              text: response.message,
              icon: "error",
              confirmButtonText: "OK",
            });
          }
        },
        error: function (error) {
          console.log(error);
          alert("Something went wrong!");
        },
      });
    });
  });
</script>
<script>
  $(document).ready(function () {
    $(document).on("change", "#picture_input", function () {
      var file = this.files[0];
      if (file) {
        var reader = new FileReader();
        reader.onload = function (e) {
          $("#image_preview").attr("src", e.target.result);
          $("#image_preview").show();
        };
        reader.readAsDataURL(file);
      } else {
        $("#image_preview").hide();
      }
    });
  });
</script>
