<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In</title>

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        body {
            
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border-radius: 14px;
            overflow: hidden;
        }
        .login-header {
            background: #405189;
            color: #fff;
            text-align: center;
            padding: 25px;
        }
        .form-control {
            padding-left: 45px;
        }
        .form-icon {
            position: relative;
        }
        .form-icon i {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: #405189;
        }
        .btn-login {
            background: #0ab39c;
            border: none;
        }
        .btn-login:hover {
            background: #099885;
        }
    </style>
</head>

<body>

<div class="col-md-5 col-lg-4">
    <div class="card shadow-lg login-card">

        <!-- Title -->
        <div class="login-header">
            <h3 class="mb-1">Welcome Back</h3>
            <p class="mb-0 opacity-75">Sign in to continue 🚀</p>
        </div>

        <!-- Login Form -->
        <div class="card-body p-4">
            <form method="POST" id="signin_data">
                {% csrf_token %}

                <div class="mb-3 form-icon">
                    <i class="ri-mail-line"></i>
                    <input type="email" class="form-control" name="email" placeholder="Email Address">
                </div>

                <div class="mb-3 form-icon">
                    <i class="ri-id-card-line"></i>
                    <input type="text" class="form-control" name="cnic" placeholder="CNIC (XXXXX-XXXXXXX-X)" maxlength="15">
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label" for="remember">
                            Remember me
                        </label>
                    </div>
                    <a href="{% url 'forget_password' %}" class="text-decoration-none text-primary fw-semibold">
                        Forgot Password?
                    </a>
                </div>

                <div class="d-grid mt-3">
                    <button type="submit" id="sign_in" class="btn btn-login btn-lg text-white">
                        <i class="ri-login-circle-line me-1"></i> Sign In
                    </button>
                </div>
            </form>

            <div class="text-center mt-3">
                <small class="text-muted">
                    Don’t have an account?
                    <a href="{% url 'registration' %}" class="fw-semibold">Register</a>
                </small>
            </div>
        </div>
    </div>
</div>

</body>
</html>

<script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
<script>
$(document).ready(function(){
    $(document).on("click", "#sign_in", function(e){
        e.preventDefault();

        var signin_data = $("#signin_data").serialize();

        $.ajax({
            url: "/sign_in/",
            method: "POST",
            data: signin_data,

            success: function(response){
                if(response.status === "success"){
                    alert(response.message);
                    window.location.href = response.redirect_url;
                } else {
                    alert(response.message);
                }
            },

            error: function(error){
                console.log(error);
            }
        });
    });
});
</script>
