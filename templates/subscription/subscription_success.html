<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Subscription Successful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .success-card { max-width: 550px; margin: 60px auto; border: none; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); background: white; }
        .icon-box { width: 100px; height: 100px; background: #e8f5e9; color: #2e7d32; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; font-size: 50px; }
        .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card success-card p-5 text-center">
            <div class="icon-box">✔</div>
            <h2 class="fw-bold mt-4">Subscription Active!</h2>
            <p class="text-muted">Mubarak ho! Aapka premium plan active ho chuka hai.</p>
            
            <div class="mt-4 px-3">
                <div class="detail-row">
                    <span><strong>Customer:</strong></span>
                    <span>{{ email }}</span>
                </div>
                <!-- <div class="detail-row">
                    <span><strong>Plan ID:</strong></span>
                    <span class="text-truncate" style="max-width: 150px;">{{ price_id }}</span>
                </div> -->
                <div class="detail-row">
                    <span><strong>Status:</strong></span>
                    <span class="badge bg-success">Active / Paid</span>
                </div>
            </div>

            <div class="mt-5">
                <a href="/index_file/" class="btn btn-primary btn-lg w-100 shadow-sm">Go to My Dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>
