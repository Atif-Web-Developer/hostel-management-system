{% include 'header.html' %} {% include 'sidebar.html' %}

<div class="main-content">
  <div class="page-content">
    <div class="container-fluid">
      <!-- start page title -->
      <div class="row">
        <div class="col-12">
          <div
            class="page-title-box d-sm-flex align-items-center justify-content-between bg-galaxy-transparent"
          >
            <h4 class="mb-sm-0">Datatables</h4>

            <div class="page-title-right">
              <ol class="breadcrumb m-0">
                <li class="breadcrumb-item">
                  <a href="javascript: void(0);">Tables</a>
                </li>
                <li class="breadcrumb-item active">Datatables</li>
              </ol>
            </div>
          </div>
        </div>
      </div>
      <!-- end page title -->

      <div class="row">
        <div class="col-lg-6 mx-auto">
          <div class="card">
            <div class="card-header bg-success text-white">
              <h5 class="mb-0 text-center">Assign Student to Room</h5>
            </div>

            <div class="card-body">
              <form id="room_allocation_form">
                {% csrf_token %}

                <!-- Student -->
                <div class="mb-3">
                  <label class="form-label">Select Student</label>
                  <select name="student_id" class="form-control" required>
                    <option value="">-- Select Student --</option>
                    {% for s in students %}
                    <option value="{{s.id}}">
                        {{s.name}}
                    </option>
                    {% endfor %}
                   
                  </select>
                </div>

                <!-- Room -->
                <div class="mb-3">
                  <label class="form-label">Select Room</label>
                  <select name="room_id" class="form-control" required>
                    <option value="">-- Select Room --</option>
                    {% for r in rooms %}
                    <option value="{{r.id}}">
                         Room {{ r.room_number }} |  {{ r.hostel_name }} Hostel | {{ r.room_type }} |  {{r.capacity}} capacity  |  {{r.floor}}th floor  
                    </option>
                    {% endfor %}
                  
                    
                  </select>
                </div>
                

                <!-- Submit -->
                <button type="submit" class="btn btn-success w-100" id="assign_room">
                  Assign Room
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!--end row-->
    </div>
    <!-- container-fluid -->
  </div>
  <!-- End Page-content -->
</div>

<script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap JS Bundle (includes Popper) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
$(document).ready(function(){
    $(document).on("click","#assign_room",function(e){
        e.preventDefault();

        var form = document.getElementById("room_allocation_form");
        var data = new FormData(form);

        $.ajax({
            url: "{% url 'assign_room' %}",
            type: "POST",
            data: data,
            processData: false,
            contentType: false,
            success: function(response){
                if(response.status == "success"){
                    Swal.fire({
                        icon: "success",
                        title: "Assigned!",
                        text: response.message,
                        timer: 2000,
                        showConfirmButton: false
                    });

                    // Reset form after successful assignment
                    $("#room_allocation_form")[0].reset();
                } else {
                    Swal.fire({
                        icon: "error",
                        title: "Error",
                        text: response.message
                    });
                }
            },
            error: function(error){
                console.log(error);
                Swal.fire({
                    icon: "error",
                    title: "Error",
                    text: "Something went wrong. Check console."
                });
            }
        });
    });
});
</script>
