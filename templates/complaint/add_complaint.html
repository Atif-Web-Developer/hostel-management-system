{% include 'header.html' %} {% include 'sidebar.html' %}

<div class="main-content">
  <div class="page-content">
    <div class="container-fluid">
      <!-- Page Title -->
      <div class="row mb-4">
        <div class="col-12">
          <div
            class="page-title-box d-sm-flex align-items-center justify-content-between bg-light p-3 rounded shadow-sm"
          >
            <h4 class="mb-0 text-dark">Register New Complaint 🛠️</h4>
            <ol class="breadcrumb mb-0">
              <li class="breadcrumb-item"><a href="#">Dashboard</a></li>
              <li class="breadcrumb-item active">Add Complaint</li>
            </ol>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-12">
          <div class="card shadow-sm border-0">
            <div class="card-header bg-danger p-3">
              <h5 class="mb-0 text-white">Complaint Details</h5>
            </div>
            <div class="card-body p-4">
              <form
                method="POST"
                id="formdata"
                action=""
                enctype="multipart/form-data"
              >
                {% csrf_token %}
                <div class="row g-4">
                  <div class="col-md-6">
                    <label for="student" class="form-label fw-bold"
                      >Student Name</label
                    >
                    <select
                      class="form-select"
                      id="student"
                      name="student"
                      required
                    >
                      <option value="" selected disabled>Select Student</option>
                      {% for s in students %}
                      <option value="{{ s.id }}">{{ s.name }}</option>
                      {% endfor %}
                    </select>
                  </div>

                  <div class="col-md-6">
                    <label for="room_no" class="form-label fw-bold"
                      >Room Number</label
                    >
                    <select
                      class="form-select"
                      id="room_no"
                      name="room_no"
                      required
                    >
                      <option value="" selected disabled>
                        Select Your Room
                      </option>
                      {% for room in rooms %}
                      <option value="{{ room.id }}">
                        {{ room.room_number }}
                      </option>
                      {% endfor %}
                    </select>
                  </div>

                  <div class="col-md-12">
                    <label for="description" class="form-label fw-bold"
                      >Complaint Description</label
                    >
                    <textarea
                      class="form-control"
                      id="description"
                      name="description"
                      rows="4"
                      placeholder="Masla tafseel se likhein (e.g. Fan button is broken)"
                      required
                    ></textarea>
                  </div>

                  <div class="col-md-12">
                    <label for="complaint_img" class="form-label fw-bold"
                      >Attach Image (Evidence)</label
                    >
                    <input
                      type="file"
                      class="form-control"
                      id="complaint_img"
                      name="complaint_img"
                      accept="image/*"
                    />
                    <div class="form-text mt-2 text-muted">
                      Aap kharab cheez ki picture upload kar saktay hain.
                    </div>
                  </div>
                  <div class="col-md-12">
                    <label for="category" class="form-label fw-bold"
                      >Category And Name</label
                    >
                    <select
                      class="form-select"
                      id="category"
                      name="category"
                      required
                    >
                    <option value="" selected disabled>Select Category</option>
                      {% for x in complaint_category %}
                      <option value="{{x.id}}">{{x.name}}({{x.profession}})({{x.email}})</option>
                      {% endfor %}

                    </select>
                  </div>

                  <div class="col-12 mt-4">
                    <button
                      type="submit"
                      class="btn btn-danger btn-lg w-100 shadow-sm"
                    >
                      <i class="ri-save-line align-bottom me-1"></i> Submit My
                      Complaint
                    </button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
      <!-- End Form -->
    </div>
  </div>

  {% include 'footer.html' %}
</div>
<script
  src="https://code.jquery.com/jquery-3.7.1.js"
  integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
  crossorigin="anonymous"
></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
  $(document).ready(function () {
    $("#formdata").on("submit", function (e) {
      e.preventDefault();
      var data = new FormData(this);
      $.ajax({
        url: "{% url 'insert_complaint' %}",
        method: "POST",
        data: data,
        processData: false, // FormData ke liye ye lazmi hai
        contentType: false, // FormData ke liye ye lazmi hai
        success: function (response) {
          if (response.status === "success") {
            Swal.fire({
              title: "Success!",
              text: response.message,
              icon: "success",
              timer: 2000,
              showConfirmButton: false,
            });

            // Reset form
            $("#formdata")[0].reset();
          } else {
            // Error popup
            Swal.fire({
              title: "Error!",
              text: response.message,
              icon: "error",
              confirmButtonText: "OK",
            });
          }
        },
        error: function (error) {
          console.log(error);
        },
      });
    });
  });
</script>
