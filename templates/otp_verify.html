<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Verify OTP</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        border-radius: 14px;
        overflow: hidden;
      }
      .login-header {
        background: #405189;
        color: #fff;
        text-align: center;
        padding: 25px;
      }
      .form-control {
        padding-left: 45px;
      }
      .form-icon {
        position: relative;
      }
      .form-icon i {
        position: absolute;
        top: 50%;
        left: 15px;
        transform: translateY(-50%);
        color: #405189;
      }
      .btn-login {
        background: #0ab39c;
        border: none;
      }
      .btn-login:hover {
        background: #099885;
      }
      /* OTP boxes style */
      .otp-input {
        width: 50px;
        height: 50px;
        text-align: center;
        font-size: 22px;
        font-weight: bold;
        border: 2px solid #ced4da;
        border-radius: 8px;
        padding: 0;
      }
      .otp-input:focus {
        border-color: #405189;
        box-shadow: 0 0 0 0.2rem rgba(64, 81, 137, 0.25);
        outline: none;
      }
    </style>
  </head>

  <body>
    <div class="col-md-5 col-lg-4">
      <div class="card shadow-lg login-card">
        <div class="login-header">
          <h3 class="mb-1">Verify OTP</h3>
          <p class="mb-0 opacity-75">
            Enter the 6-digit code sent to your email
          </p>
        </div>

        <div class="card-body p-4">
          <form id="otp_form">
            {% csrf_token %}

            <!-- 6 Alag Alag OTP Boxes -->
            <div class="d-flex justify-content-center gap-2 mb-3">
              <input type="text" class="otp-input" maxlength="1" id="otp1" />
              <input type="text" class="otp-input" maxlength="1" id="otp2" />
              <input type="text" class="otp-input" maxlength="1" id="otp3" />
              <input type="text" class="otp-input" maxlength="1" id="otp4" />
              <input type="text" class="otp-input" maxlength="1" id="otp5" />
              <input type="text" class="otp-input" maxlength="1" id="otp6" />
            </div>

            <!-- Message Box -->
            <div id="msg_box"></div>

            <div class="d-grid mt-3">
              <button
                type="submit"
                id="verify_btn"
                class="btn btn-login btn-lg text-white"
              >
                <i class="ri-shield-check-line me-1"></i> Verify OTP
              </button>
            </div>
          </form>

          <!-- Resend OTP -->
          <div class="text-center mt-3">
            <small class="text-muted">
              Didn't receive OTP?
              <a href="{% url 'forget_password' %}" class="fw-semibold"
                >Resend</a
              >
            </small>
          </div>
        </div>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
      $(document).ready(function () {
        $(".otp-input").on("input", function () {
          if ($(this).val().length === 1) {
            $(this).next(".otp-input").focus();
          }
        });
        $("#otp_form").on("submit", function (e) {
          e.preventDefault();
          var otp =
            $("#otp1").val() +
            $("#otp2").val() +
            $("#otp3").val() +
            $("#otp4").val() +
            $("#otp5").val() +
            $("#otp6").val();
          if (otp.length < 6) {
            $("#msg_box").html(
              '<div class="alert alert-danger mt-2">Please enter complete 6 digit OTP</div>',
            );
          }
          var csrf = $("[name=csrfmiddlewaretoken]").val();
          $.ajax({
            url: "{% url 'otp_verify' %}",
            method: "POST",
            data: {
              otp: otp,
              csrfmiddlewaretoken: csrf,
            },
            success: function (response) {
              if (response.status === "success") {
                $("#msg_box").html(
                  '<div class="alert alert-success mt-2">OTP Verified! Redirecting...</div>',
                );
                setTimeout(function () {
                  window.location.href = "/index_file/";
                }, 1500);
              } else {
                $("#msg_box").html(
                  '<div class="alert alert-danger mt-2">' +
                    response.message +
                    "</div>",
                );
              }
            },
            error: function (error) {
              console.log(error);
            },
          });
        });
      });
    </script>
  </body>
</html>
