<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Cancelled</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .cancel-card { max-width: 500px; margin: 80px auto; border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .error-icon { font-size: 80px; color: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card cancel-card text-center p-5">
            <div class="error-icon">✘</div>
            <h2 class="fw-bold mt-3">Payment Cancelled</h2>
            <p class="text-muted">Aapne payment cancel kar di hai. Koi paise nahi kate.</p>
            
            <div class="mt-4">
                <a href="/checkout/{{ payment.id }}/" class="btn btn-outline-danger w-100 mb-2">Try Again</a>
                <a href="/" class="text-decoration-none text-muted">Go to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
