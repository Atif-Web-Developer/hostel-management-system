{% include 'header.html' %} {% include 'sidebar.html' %}

<div class="main-content">
  <div class="page-content">
    <div class="container-fluid">
      <!-- Page Title -->
      <div class="row mb-4">
        <div class="col-12">
          <div
            class="page-title-box d-sm-flex align-items-center justify-content-between bg-light p-3 rounded"
          >
            <h4 class="mb-0">Add New Fee Payment</h4>
            <ol class="breadcrumb mb-0">
              <li class="breadcrumb-item"><a href="">Dashboard</a></li>
              <li class="breadcrumb-item active">Add Fee</li>
            </ol>
          </div>
        </div>
      </div>

      <!-- Fee Form -->
      <div class="row">
        <div class="col-12">
          <div class="card shadow-sm border-0">
            <div class="card-header text-white bg-success">
              <h5 class="mb-0" style="text-align: center">Fee Information</h5>
            </div>

            <div class="card-body">
              <form method="post" id="fee_form">
                {% csrf_token %}

                <div class="row">
                  <!-- Left Side: Form Fields -->
                  <div class="col-md-8">
                    <!-- Student Select -->
                    <div class="mb-3">
                      <label class="form-label">Student</label>
                      <select name="student" class="form-select" required>
                        <option value="">Select Student</option>
                        {% for s in students %}
                        <option value="{{ s.id }}">{{ s.name }}</option>
                        {% endfor %}
                      </select>
                    </div>

                    <!-- Amount -->
                    <div class="mb-3">
                      <label class="form-label">Amount (Rs.)</label>
                      <input
                        type="number"
                        name="amount"
                        class="form-control"
                        placeholder="Enter fee amount"
                        required
                      />
                    </div>

                    <!-- Submit Button -->
                    <button
                      type="submit"
                      id="add_fee"
                      class="btn btn-success mt-3"
                    >
                      Add Fee
                    </button>
                  </div>

                  <!-- Right Side: Optional Info / Placeholder -->
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
      <!-- End Form -->
    </div>
  </div>

  {% include 'footer.html' %}
</div>
<script
  src="https://code.jquery.com/jquery-3.7.1.js"
  integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
  crossorigin="anonymous"
></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  $(document).ready(function () {
    $(document).on("submit", "#fee_form", function (e) {
      e.preventDefault();
      var form = $(this)[0];
      var form_data = new FormData(form);
      $.ajax({
        url: "{% url 'addfeepayment' %}",
        method: "POST",
        data: form_data,
        contentType: false,
        processData: false,
        success: function (response) {
          if (response.status === "success") {
            Swal.fire({
              title: "Success!",
              text: response.message,
              icon: "success",
              timer: 4000,
              showConfirmButton: false,
            });

            // Reset form
            $("#fee_form")[0].reset();
          } else {
            // Error popup
            Swal.fire({
              title: "Error!",
              text: response.message,
              icon: "error",
              confirmButtonText: "OK",
            });
          }
        },
        error: function (error) {
          console.log(error);
        },
      });
    });
  });
</script>
