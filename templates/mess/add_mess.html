{% include 'header.html' %} {% include 'sidebar.html' %}

<div class="main-content">
  <div class="page-content">
    <div class="container-fluid">
      <div class="row mb-4">
        <div class="col-12">
          <div
            class="page-title-box d-sm-flex align-items-center justify-content-between bg-light p-3 rounded"
          >
            <h4 class="mb-0">Add Mess Menu</h4>
            <ol class="breadcrumb mb-0">
              <li class="breadcrumb-item"><a href="">Dashboard</a></li>
              <li class="breadcrumb-item active">Add Mess</li>
            </ol>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-12">
          <div class="card shadow-sm border-0">
            <div class="card-header text-white bg-primary">
              <h5 class="mb-0" style="text-align: center; color: white">
                Mess Menu Information
              </h5>
            </div>

            <div class="card-body">
              <form method="post" id="mess_form">
                {% csrf_token %}

                <div class="row">
                  <div class="col-md-6">
                    <div class="mb-3">
                      <label class="form-label">Select Day</label>
                      <select name="day" class="form-select" required>
                        <option value="">Choose Day...</option>
                        <option value="Monday">Monday</option>
                        <option value="Tuesday">Tuesday</option>
                        <option value="Wednesday">Wednesday</option>
                        <option value="Thursday">Thursday</option>
                        <option value="Friday">Friday</option>
                        <option value="Saturday">Saturday</option>
                        <option value="Sunday">Sunday</option>
                      </select>
                    </div>

                    <div class="mb-3">
                      <label class="form-label">Meal Type</label>
                      <select name="meal_type" class="form-select" required>
                        <option value="">Choose Meal...</option>
                        <option value="Breakfast">Breakfast</option>
                        <option value="Lunch">Lunch</option>
                        <option value="Dinner">Dinner</option>
                      </select>
                    </div>
                  </div>

                  <div class="col-md-6">
                    <div class="mb-3">
                      <label class="form-label">Food Item</label>
                      <select
                        name="food_item"
                        id="food_item_dropdown"
                        class="form-select"
                        required
                      >
                        <option value="">Select Food Item</option>
                        <option value="Daal Chawal">Daal Chawal</option>
                        <option value="Chicken Karahi">Chicken Karahi</option>
                        <option value="Biryani">Biryani</option>
                        <option value="Anda Paratha">Anda Paratha</option>
                        <option value="Omelette">Omelette</option>
                        <option value="Custom">
                          --- Other (Write Custom) ---
                        </option>
                      </select>
                    </div>

                    <div
                      class="mb-3"
                      id="custom_field_div"
                      style="display: none"
                    >
                      <label class="form-label text-danger"
                        >Custom Food Name</label
                      >
                      <input
                        type="text"
                        name="custom_food_item"
                        class="form-control"
                        placeholder="Enter special dish name"
                      />
                    </div>

                    <div class="mb-3">
                      <label class="form-label">Price</label>
                      <input
                        type="number"
                        step="0.01"
                        name="price"
                        class="form-control"
                        placeholder="0.00"
                        required
                      />
                    </div>
                  </div>
                </div>

                <div class="row mt-3">
                  <div class="col-12 text-center">
                    <button
                      type="submit"
                      class="btn btn-primary w-md"
                      id="save_mess"
                    >
                      Save Mess Menu
                    </button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  {% include 'footer.html' %}
</div>
<script
  src="https://code.jquery.com/jquery-3.7.1.js"
  integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
  crossorigin="anonymous"
></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  $(document).ready(function () {
    $(document).on("change", "#food_item_dropdown", function () {
      var get_val = $(this).val();
      if (get_val == "Custom") {
        $("#custom_field_div").fadeIn();
        $("#custom_field_div input").prop("required", true);
      } else {
        $("#custom_field_div").fadeOut();
        $("#custom_field_div input").prop("required", false);
        $("#custom_field_div input").val("");
      }
    });
  });
</script>
<script>
  $(document).ready(function () {
    $(document).on("click", "#save_mess", function (e) {
      e.preventDefault();
      var data = $("#mess_form")[0];
      var from_data = new FormData(data);
      $.ajax({
        url: "{% url 'insert_mess' %}",
        method: "POST",
        data: from_data,
        contentType: false,
        processData: false,
        success: function (response) {
          if (response.status === "success") {
            Swal.fire({
              title: "Success!",
              text: response.message,
              icon: "success",
              timer: 4000,
              showConfirmButton: false,
            });

            // Reset form
            $("#mess_form")[0].reset();
          } else {
            // Error popup
            Swal.fire({
              title: "Error!",
              text: response.message,
              icon: "error",
              confirmButtonText: "OK",
            });
          }
        },
        error: function (error) {
          console.log(error);
        },
      });
    });
  });
</script>
